<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dofus 1.29 — Farmer Bot</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --green: #3fb950;
    --red: #f85149;
    --amber: #e3b341;
    --blue: #58a6ff;
    --purple: #bc8cff;
    --cell-size: 32px;
    --cols: 14;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 13px;
    display: grid;
    grid-template-columns: 1fr 340px;
    grid-template-rows: 48px 1fr;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    grid-column: 1 / -1;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
  }
  header h1 { font-size: 15px; font-weight: 600; letter-spacing: .03em; }

  .badge {
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .06em;
  }
  .badge.idle            { background:#21262d; color:var(--muted);   border:1px solid var(--border); }
  .badge.moving          { background:#1c2d3b; color:var(--blue);    border:1px solid #1f4a6e; }
  .badge.harvesting      { background:#1c2d1c; color:var(--green);   border:1px solid #1f4d1f; }
  .badge.waiting_respawn { background:#2d2a1a; color:var(--amber);   border:1px solid #5a4f1a; }
  .badge.paused          { background:#2d1a2d; color:var(--purple);  border:1px solid #4e2d4e; }
  .badge.error           { background:#2d1a1a; color:var(--red);     border:1px solid #5a1a1a; }

  .spacer { flex: 1; }

  .stat-pill {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 12px;
    color: var(--muted);
  }
  .stat-pill strong { color: var(--text); font-weight: 600; }

  .conn-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--red);
    transition: background .3s;
    flex-shrink: 0;
  }
  .conn-dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); }

  /* ── Main / map ── */
  main {
    overflow: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .map-info { align-self: flex-start; color: var(--muted); font-size: 12px; }
  .map-info strong { color: var(--text); }

  #map-grid {
    display: grid;
    grid-template-columns: repeat(var(--cols), var(--cell-size));
    gap: 2px;
    background: var(--surface);
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
  }

  .cell {
    width: var(--cell-size); height: var(--cell-size);
    border-radius: 4px;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: var(--muted);
    cursor: default;
    transition: all 0.2s ease;
    position: relative;
  }
  .cell.resource-available { background:#0d2b0d; border-color:#1a5c1a; }
  .cell.resource-available::after {
    content:''; width:10px; height:10px;
    background:var(--green); border-radius:50%;
    box-shadow: 0 0 6px var(--green);
  }
  .cell.resource-harvested { background:#2b0d0d; border-color:#5c1a1a; }
  .cell.resource-harvested::after {
    content:''; width:8px; height:8px;
    background:#5c1a1a; border-radius:50%;
  }
  .cell.player { background:#0d1e2b; border-color:var(--blue); border-width:2px; z-index:2; }
  .cell.player::after { content:'◆'; color:var(--blue); font-size:12px; text-shadow:0 0 8px var(--blue); }
  .cell.player.resource-available { background:#0d2b2b; border-color:var(--blue); }
  .cell.target { animation: pulse-target 1s ease-in-out infinite; }
  @keyframes pulse-target {
    0%,100% { border-color:var(--amber); box-shadow:0 0 0 0 rgba(227,179,65,.4); }
    50%      { box-shadow: 0 0 0 4px rgba(227,179,65,.1); }
  }
  .cell:hover { border-color: var(--muted); }

  .legend { display:flex; gap:16px; align-self:flex-start; }
  .legend-item { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--muted); }
  .legend-dot { width:10px; height:10px; border-radius:50%; }
  .legend-dot.green  { background:var(--green); box-shadow:0 0 4px var(--green); }
  .legend-dot.red    { background:#5c1a1a; }
  .legend-dot.blue   { background:var(--blue); box-shadow:0 0 4px var(--blue); }
  .legend-dot.amber  { background:var(--amber); }

  /* ── Sidebar ── */
  aside {
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .panel { border-bottom: 1px solid var(--border); padding: 14px 16px; }
  .panel-title {
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .08em;
    color: var(--muted); margin-bottom: 12px;
  }

  /* Boutons */
  .btn-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px; }
  button {
    padding: 7px 12px; border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text); font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all .15s;
  }
  button:hover   { background:#2c3139; border-color:var(--muted); }
  button:active  { transform: scale(.97); }
  button.primary { background:#1a3a1a; border-color:#3fb950; color:var(--green); }
  button.primary:hover { background:#1f4d1f; }
  button.danger  { background:#3a1a1a; border-color:#f85149; color:var(--red); }
  button.danger:hover  { background:#4d1f1f; }

  /* Config sliders */
  .config-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .config-row label { color:var(--muted); min-width:100px; font-size:11px; }
  .config-row input[type=range] { flex:1; accent-color:var(--blue); }
  .config-row span  { min-width:32px; text-align:right; color:var(--text); font-size:11px; font-weight:600; }
  .config-row select {
    flex:1; background:var(--surface2); border:1px solid var(--border);
    color:var(--text); border-radius:4px; padding:3px 6px; font-size:11px;
  }

  /* Stats */
  .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .stat-card { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:10px 12px; }
  .stat-card .label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin-bottom:4px; }
  .stat-card .value { font-size:20px; font-weight:700; color:var(--text); }
  .stat-card .value.green { color:var(--green); }
  .stat-card .value.amber { color:var(--amber); }

  /* Ressources */
  #resources-list { max-height:120px; overflow-y:auto; display:flex; flex-direction:column; gap:3px; }
  .resource-row { display:flex; align-items:center; gap:6px; font-size:11px; padding:3px 0; }
  .resource-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .resource-dot.avail { background:var(--green); }
  .resource-dot.used  { background:#5c1a1a; }
  .resource-row .cell-id { color:var(--muted); min-width:24px; }
  .resource-row .eta { margin-left:auto; color:var(--amber); font-size:10px; }

  /* Logs */
  #logs-panel { flex:1; overflow:hidden; display:flex; flex-direction:column; }
  #logs-panel .panel-title { padding:14px 16px 0; margin-bottom:8px; }
  #logs {
    flex:1; overflow-y:auto; padding:0 16px 12px;
    display:flex; flex-direction:column; gap:3px;
  }
  .log-entry {
    display:flex; gap:8px; font-size:11px; line-height:1.5;
    padding:4px 8px; border-radius:4px; background:var(--surface2);
  }
  .log-time  { color:var(--muted); min-width:44px; flex-shrink:0; }
  .log-state { min-width:80px; font-weight:600; flex-shrink:0; }
  .log-msg   { color:var(--text); word-break:break-word; }
  .log-state.IDLE            { color:var(--muted); }
  .log-state.MOVING          { color:var(--blue); }
  .log-state.HARVESTING      { color:var(--green); }
  .log-state.WAITING_RESPAWN { color:var(--amber); }
  .log-state.PAUSED          { color:var(--purple); }
  .log-state.ERROR           { color:var(--red); }

  /* Scrollbar custom */
  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
</style>
</head>
<body>

<header>
  <h1>🌲 Dofus 1.29 Farmer</h1>
  <span id="bot-badge" class="badge idle">IDLE</span>
  <span class="stat-pill">Map: <strong id="map-id-header">—</strong></span>
  <span class="stat-pill">Pos: <strong id="pos-header">—</strong></span>
  <div class="spacer"></div>
  <span class="stat-pill">Récoltées: <strong id="total-harvested">0</strong></span>
  <span class="stat-pill">Dispo: <strong id="avail-count">0</strong></span>
  <div class="conn-dot" id="conn-dot" title="WebSocket"></div>
</header>

<main>
  <div class="map-info">
    Map ID: <strong id="map-id">—</strong> &nbsp;|&nbsp;
    Joueur cellule: <strong id="player-cell">—</strong> &nbsp;|&nbsp;
    14 × 20 cellules
  </div>

  <div id="map-grid"></div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot green"></div> Ressource disponible</div>
    <div class="legend-item"><div class="legend-dot red"></div> Récoltée</div>
    <div class="legend-item"><div class="legend-dot blue"></div> Joueur</div>
    <div class="legend-item"><div class="legend-dot amber"></div> Cible</div>
  </div>
</main>

<aside>

  <div class="panel">
    <div class="panel-title">Contrôles</div>
    <div class="btn-row">
      <button class="primary" onclick="botAction('start')">▶ Démarrer</button>
      <button class="danger"  onclick="botAction('stop')">■ Arrêter</button>
      <button onclick="botAction('pause')">⏸ Pause</button>
      <button onclick="botAction('resume')">▷ Reprendre</button>
    </div>
    <button style="width:100%;font-size:11px;color:var(--muted)" onclick="forceRefresh()">↻ Rafraîchir état</button>
  </div>

  <div class="panel">
    <div class="panel-title">Configuration</div>
    <div class="config-row">
      <label>Métier (skill)</label>
      <select id="skill-id" onchange="updateConfig()">
        <option value="6">Bûcheron (6)</option>
        <option value="4">Mineur (4)</option>
        <option value="3">Alchimiste (3)</option>
        <option value="2">Paysan (2)</option>
        <option value="5">Pêcheur (5)</option>
      </select>
    </div>
    <div class="config-row">
      <label>Délai min</label>
      <input type="range" id="delay-min" min="0.2" max="3" step="0.1" value="0.8"
             oninput="updateConfig()">
      <span id="delay-min-val">0.8s</span>
    </div>
    <div class="config-row">
      <label>Délai max</label>
      <input type="range" id="delay-max" min="0.5" max="5" step="0.1" value="1.8"
             oninput="updateConfig()">
      <span id="delay-max-val">1.8s</span>
    </div>
    <div class="config-row">
      <label>Durée récolte</label>
      <input type="range" id="harvest-dur" min="2" max="12" step="0.5" value="5.5"
             oninput="updateConfig()">
      <span id="harvest-dur-val">5.5s</span>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">Statistiques</div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="label">Récoltées</div>
        <div class="value green" id="stat-harvested">0</div>
      </div>
      <div class="stat-card">
        <div class="label">Disponibles</div>
        <div class="value" id="stat-avail">0</div>
      </div>
      <div class="stat-card">
        <div class="label">Session</div>
        <div class="value amber" id="stat-session">0s</div>
      </div>
      <div class="stat-card">
        <div class="label">Map ID</div>
        <div class="value" id="stat-map">—</div>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">Ressources (<span id="res-count">0</span>)</div>
    <div id="resources-list"></div>
  </div>

  <div id="logs-panel">
    <div class="panel-title">Logs</div>
    <div id="logs"></div>
  </div>

</aside>

<script>
// ── Grille ───────────────────────────────────────────────────────────────────
const COLS = 14, ROWS = 20, CELLS = COLS * ROWS;
const grid = document.getElementById('map-grid');
const cells = [];

for (let i = 0; i < CELLS; i++) {
  const div = document.createElement('div');
  div.className = 'cell';
  div.title = `Cell ${i} (${i % COLS}, ${Math.floor(i / COLS)})`;
  grid.appendChild(div);
  cells.push(div);
}

// ── Utilitaires ───────────────────────────────────────────────────────────────

// Supprime les séquences ANSI qui auraient pu passer
function stripAnsi(str) {
  return (str || '').replace(/\x1B\[[0-9;]*m/g, '');
}

function fmtTime(ts) {
  const d = new Date(ts * 1000);
  return d.getHours().toString().padStart(2,'0') + ':' +
         d.getMinutes().toString().padStart(2,'0') + ':' +
         d.getSeconds().toString().padStart(2,'0');
}

function fmtDuration(secs) {
  const m = Math.floor(secs / 60), s = secs % 60;
  return m > 0 ? `${m}m${s}s` : `${s}s`;
}

// ── Rendu état ────────────────────────────────────────────────────────────────

function applyState(data) {
  const { game, bot, logs } = data;

  // Header
  document.getElementById('map-id-header').textContent  = game.map_id || '—';
  document.getElementById('pos-header').textContent     =
    game.player_cell_id ? `${game.player_x},${game.player_y}` : '—';
  document.getElementById('total-harvested').textContent = game.total_harvested;
  document.getElementById('avail-count').textContent    = game.available_count;

  // Map info
  document.getElementById('map-id').textContent    = game.map_id || '—';
  document.getElementById('player-cell').textContent =
    game.player_cell_id !== undefined ? game.player_cell_id : '—';

  // Badge état
  const badge = document.getElementById('bot-badge');
  const s = (bot.state || 'idle').toLowerCase();
  badge.textContent = bot.state || 'IDLE';
  badge.className   = 'badge ' + s;

  // Stats
  document.getElementById('stat-harvested').textContent = game.total_harvested;
  document.getElementById('stat-avail').textContent     = game.available_count;
  document.getElementById('stat-map').textContent       = game.map_id || '—';
  document.getElementById('stat-session').textContent   = fmtDuration(game.session_duration || 0);

  // Sync sliders depuis le bot (au premier chargement)
  if (!window._configSynced && bot.delay_min !== undefined) {
    document.getElementById('delay-min').value = bot.delay_min;
    document.getElementById('delay-max').value = bot.delay_max;
    document.getElementById('harvest-dur').value = bot.harvest_duration;
    document.getElementById('skill-id').value = bot.skill_id || 6;
    document.getElementById('delay-min-val').textContent  = bot.delay_min.toFixed(1) + 's';
    document.getElementById('delay-max-val').textContent  = bot.delay_max.toFixed(1) + 's';
    document.getElementById('harvest-dur-val').textContent = bot.harvest_duration.toFixed(1) + 's';
    window._configSynced = true;
  }

  // Grille
  cells.forEach(c => c.className = 'cell');
  const targetCell = bot.current_target ? bot.current_target.cell_id : null;

  (game.resources || []).forEach(r => {
    const c = cells[r.cell_id];
    if (!c) return;
    c.classList.add(r.available ? 'resource-available' : 'resource-harvested');
    if (r.cell_id === targetCell) c.classList.add('target');
  });

  if (game.player_cell_id !== undefined && cells[game.player_cell_id]) {
    cells[game.player_cell_id].classList.add('player');
  }

  // Liste ressources sidebar
  const rl = document.getElementById('resources-list');
  const allRes = game.resources || [];
  document.getElementById('res-count').textContent = allRes.length;
  rl.innerHTML = '';
  const sorted = [...allRes].sort((a, b) => {
    if (a.available !== b.available) return b.available - a.available;
    return a.cell_id - b.cell_id;
  });
  sorted.slice(0, 20).forEach(r => {
    const row = document.createElement('div');
    row.className = 'resource-row';
    const eta = r.respawn_eta !== null && r.respawn_eta !== undefined
      ? `<span class="eta">${Math.ceil(r.respawn_eta)}s</span>` : '';
    row.innerHTML =
      `<div class="resource-dot ${r.available ? 'avail' : 'used'}"></div>` +
      `<span class="cell-id">${r.cell_id}</span>` +
      `<span style="color:var(--muted)">${r.cell_x},${r.cell_y}</span>` +
      `<span style="color:var(--muted);margin-left:4px;font-size:10px">×${r.harvest_count}</span>` +
      eta;
    rl.appendChild(row);
  });

  // Logs
  renderLogs(logs || []);
}

function renderLogs(logs) {
  const container = document.getElementById('logs');
  container.innerHTML = '';
  [...logs].reverse().forEach(entry => {
    const div = document.createElement('div');
    div.className = 'log-entry';
    const msg = stripAnsi(entry.msg || '');
    div.innerHTML =
      `<span class="log-time">${fmtTime(entry.time)}</span>` +
      `<span class="log-state ${entry.state || ''}">${entry.state || ''}</span>` +
      `<span class="log-msg">${escHtml(msg)}</span>`;
    container.appendChild(div);
  });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Config ────────────────────────────────────────────────────────────────────

let _configTimer = null;
function updateConfig() {
  const dmin = parseFloat(document.getElementById('delay-min').value);
  const dmax = parseFloat(document.getElementById('delay-max').value);
  const hdur = parseFloat(document.getElementById('harvest-dur').value);
  const skill = parseInt(document.getElementById('skill-id').value);
  document.getElementById('delay-min-val').textContent  = dmin.toFixed(1) + 's';
  document.getElementById('delay-max-val').textContent  = dmax.toFixed(1) + 's';
  document.getElementById('harvest-dur-val').textContent = hdur.toFixed(1) + 's';
  // Debounce pour ne pas spammer le serveur
  clearTimeout(_configTimer);
  _configTimer = setTimeout(() => {
    fetch('/api/bot/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ delay_min: dmin, delay_max: dmax, harvest_duration: hdur, skill_id: skill })
    });
  }, 300);
}

function botAction(action) {
  fetch(`/api/bot/${action}`, { method: 'POST' })
    .then(r => r.json())
    .then(d => console.log(`botAction(${action}):`, d));
}

function forceRefresh() {
  Promise.all([
    fetch('/api/state').then(r => r.json()),
    fetch('/api/bot').then(r => r.json()),
    fetch('/api/logs').then(r => r.json()),
  ]).then(([game, bot, logs]) => applyState({ game, bot, logs }));
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
const socket = io({ transports: ['websocket', 'polling'] });
const dot = document.getElementById('conn-dot');

socket.on('connect',    () => { dot.classList.add('connected');    console.log('WS connecté'); });
socket.on('disconnect', () => { dot.classList.remove('connected'); console.log('WS déconnecté'); });

socket.on('state_update', data => applyState(data));

// Chargement initial via REST
forceRefresh();
</script>
</body>
</html>
